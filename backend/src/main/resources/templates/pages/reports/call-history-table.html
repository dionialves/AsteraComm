<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="table">

  <!-- Erro -->
  <div th:if="${errorMsg != null}"
       class="px-4 py-3 bg-[#fee2e2] text-[#dc2626] rounded-lg text-[13px]"
       th:text="${errorMsg}">
  </div>

  <th:block th:if="${result != null}">

    <!-- Card de contexto + botão PDF -->
    <div class="bg-white rounded-xl p-4 mb-4 border border-[#e0e0e0]">
      <div class="flex items-center justify-between">
        <div class="flex gap-8">
          <div>
            <p class="text-[11px] font-medium uppercase tracking-wide text-[#888] mb-1">Circuito</p>
            <p class="text-[15px] font-medium text-[#1a1a1a] font-mono" th:text="${result.circuitNumber}">—</p>
          </div>
          <div>
            <p class="text-[11px] font-medium uppercase tracking-wide text-[#888] mb-1">Período</p>
            <p class="text-[15px] font-medium text-[#1a1a1a]"
               th:text="${#temporals.monthName(T(java.time.LocalDate).of(result.year, result.month, 1))} + ' / ' + ${result.year}">—</p>
          </div>
        </div>
        <a id="btn-pdf-call-history" th:href="${'/reports/call-history/pdf?circuitNumber=' + result.circuitNumber + '&month=' + result.month + '&year=' + result.year}"
           class="flex items-center gap-1.5 bg-white border border-[#e0e0e0] text-[#1a1a1a] text-[13px] font-medium px-3 py-[9px] rounded-md hover:bg-[#f5f5f5] transition-colors no-underline">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Baixar PDF
        </a>
      </div>
    </div>

    <!-- 2 Totalizadores (acima da tabela) -->
    <div class="grid grid-cols-2 gap-3 mb-4" style="max-width: 400px;">
      <div class="bg-[#f5f5f5] rounded-lg px-4 py-[14px]">
        <p class="text-[12px] text-[#888] mb-1">Total ligações</p>
        <p class="text-[20px] font-medium text-[#1a1a1a]" th:text="${result.totalCalls}">0</p>
      </div>
      <div class="bg-[#E6F1FB] rounded-lg px-4 py-[14px]">
        <p class="text-[12px] text-[#0C447C] mb-1">Minutos totais</p>
        <p class="text-[20px] font-medium text-[#0C447C]" th:text="${result.totalMinutes + ' min'}">0</p>
      </div>
    </div>

    <!-- Tabela de chamadas -->
    <div class="rounded-xl border border-[#e0e0e0] overflow-x-auto mb-4">

      <!-- Header (fundo branco) -->
      <div class="call-history-row bg-white border-b border-[#e0e0e0]">
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Data/hora</span>
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Origem</span>
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Destino</span>
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Tipo</span>
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Direção</span>
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Duração</span>
        <span class="text-[11px] font-medium text-[#888] uppercase tracking-wide">Status</span>
      </div>

      <!-- Vazio -->
      <div th:if="${result.lines.empty}" class="py-10 text-center text-[13px] text-[#aaa]">
        Nenhuma chamada no período.
      </div>

      <!-- Linhas -->
      <div th:each="line, stat : ${result.lines}"
           th:class="|call-history-row bg-white ${stat.last ? '' : 'border-b border-[#f0f0f0]'}|">

        <span class="text-[13px] font-mono text-[#1a1a1a]"
              th:text="${#temporals.format(line.callDate, 'dd/MM/yy HH:mm')}"></span>

        <span class="text-[13px] font-mono text-[#1a1a1a]" th:text="${line.callerNumber ?: '—'}"></span>

        <span class="text-[13px] font-mono text-[#1a1a1a]" th:text="${line.dst}"></span>

        <span th:class="|rounded-[99px] text-[11px] px-[8px] py-[2px] font-medium whitespace-nowrap
                         ${line.callType?.name() == 'FIXED_LOCAL'          ? 'bg-[#E6F1FB] text-[#0C447C]' :
                           line.callType?.name() == 'MOBILE_LOCAL'         ? 'bg-[#EEEDFE] text-[#3C3489]' :
                           line.callType?.name() == 'FIXED_LONG_DISTANCE'  ? 'bg-[#f5f5f5] text-[#888]'    :
                           line.callType?.name() == 'MOBILE_LONG_DISTANCE' ? 'bg-[#FAECE7] text-[#712B13]' : 'bg-[#f5f5f5] text-[#888]'}|"
              th:text="${line.callType?.name() == 'FIXED_LOCAL'          ? 'Fixo Local'  :
                         line.callType?.name() == 'MOBILE_LOCAL'         ? 'Móvel Local' :
                         line.callType?.name() == 'FIXED_LONG_DISTANCE'  ? 'Fixo LD'     :
                         line.callType?.name() == 'MOBILE_LONG_DISTANCE' ? 'Móvel LD'    : '—'}">
        </span>

        <!-- Badge de direção -->
        <span th:class="|rounded-[99px] text-[11px] px-[8px] py-[2px] font-medium whitespace-nowrap
                         ${line.direction?.name() == 'OUTBOUND' ? 'bg-[#E1F5EE] text-[#085041]' : 'bg-[#FAEEDA] text-[#854F0B]'}|"
              th:text="${line.directionLabel}">
        </span>

        <span class="text-[13px] font-mono text-[#1a1a1a]"
              th:with="sec=${line.billSeconds ?: 0}, h=${sec / 3600}, m=${(sec % 3600) / 60}, s=${sec % 60}"
              th:text="${(h > 0 ? h + ':' : '') + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s}"></span>

        <span class="text-[13px] font-mono text-[#1a1a1a]" th:text="${line.dispositionLabel}"></span>

      </div>
    </div>

  </th:block>

</div>

</body>
</html>
