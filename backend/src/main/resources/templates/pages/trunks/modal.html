<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal"
     class="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center"
     onclick="closeModal()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-[780px] h-[700px] flex flex-col"
       onclick="event.stopPropagation()">

    <!-- Header -->
    <div class="flex-shrink-0 flex items-center justify-between px-5 pt-4 pb-4 border-b border-[#e5e7eb]">
      <div>
        <p class="text-[11px] text-[#888] uppercase tracking-wide font-medium">Tronco</p>
        <h2 class="text-[18px] font-medium text-[#1a1a1a] mt-0.5"
            th:text="${trunk != null} ? ${trunk.name} : 'Novo Tronco'">Tronco</h2>
      </div>
      <button type="button" onclick="closeModal()"
              class="w-7 h-7 flex items-center justify-center text-[#888] hover:text-[#1a1a1a] rounded-md transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Form unificado -->
    <form th:attr="hx-post=${trunk == null ? '/trunks' : null},
                  hx-put=${trunk != null ? '/trunks/' + trunk.name : null},
                  hx-target='#modal-container'"
          hx-swap="innerHTML"
          class="flex flex-col flex-1 min-h-0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="authType" id="input-auth-type"
             th:value="${trunk != null} ? ${trunk.authType.name()} : 'CREDENTIAL'"/>

      <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-4">

        <!-- Identificação -->
        <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Identificação</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="flex flex-col gap-1.5">
            <label class="text-[13px] font-medium text-[#1a1a1a]">ID</label>
            <input type="text" th:value="${trunk?.id}" disabled placeholder="—"
                   class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md bg-[#fafafa] text-[#aaa] font-mono outline-none"/>
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="text-[13px] font-medium text-[#1a1a1a]">Nome <span class="text-[#E24B4A]">*</span></label>
            <input id="input-trunk-name" name="name" type="text" required maxlength="50"
                   th:value="${trunk?.name}"
                   th:disabled="${trunk != null}"
                   th:classappend="${trunk != null} ? 'bg-[#f5f5f5] text-[#888] cursor-not-allowed'"
                   placeholder="Ex: operadora-a"
                   class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
          </div>
        </div>

        <hr class="border-t border-[#e5e7eb]"/>

        <!-- Tipo de autenticação -->
        <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Autenticação</p>
        <div class="flex flex-col gap-2">
          <label class="text-[13px] font-medium text-[#1a1a1a]">Tipo de autenticação</label>
          <div id="auth-type-selector"
               th:classappend="${trunk != null} ? 'pointer-events-none opacity-55'"
               class="flex border border-[#e0e0e0] rounded-md overflow-hidden text-[13px] w-fit">
            <button type="button" id="btn-auth-credential"
                    class="px-3 py-[7px] border-r border-[#e0e0e0] transition-colors"
                    onclick="setAuthType('CREDENTIAL')">
              Login / Senha
            </button>
            <button type="button" id="btn-auth-ip"
                    class="px-3 py-[7px] transition-colors"
                    onclick="setAuthType('IP_AUTH')">
              Autenticação por IP
            </button>
          </div>
          <span th:if="${trunk != null}" class="text-[11px] text-[#aaa]">O tipo não pode ser alterado após a criação.</span>
        </div>

        <hr class="border-t border-[#e5e7eb]"/>

        <!-- Conexão SIP -->
        <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Conexão SIP</p>

        <div class="flex flex-col gap-1.5">
          <label class="text-[13px] font-medium text-[#1a1a1a]">Host / Domínio SIP <span class="text-[#E24B4A]">*</span></label>
          <input name="host" type="text" required maxlength="255"
                 th:value="${trunk?.host}"
                 placeholder="Ex: sip.operadora.com.br"
                 class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors font-mono"/>
        </div>

        <!-- Campos exclusivos de CREDENTIAL -->
        <div id="fields-credential">
          <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#1a1a1a]">Usuário <span class="text-[#E24B4A]">*</span></label>
              <input id="input-username" name="username" type="text" maxlength="100"
                     th:value="${trunk?.username}"
                     placeholder="Usuário SIP"
                     class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-[13px] font-medium text-[#1a1a1a]">
                Senha
                <span th:if="${trunk == null}" class="text-[#E24B4A]">*</span>
                <span th:if="${trunk != null}" class="text-[11px] text-[#aaa] font-normal">(vazio = manter atual)</span>
              </label>
              <div class="relative">
                <input id="pwd-trunk" name="password" type="password" maxlength="100"
                       placeholder="••••••••"
                       autocomplete="new-password"
                       class="w-full px-3 py-[9px] pr-9 text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors"/>
                <button id="btn-toggle-pw" type="button"
                        class="absolute right-[9px] top-1/2 -translate-y-1/2 text-[#aaa] hover:text-[#555]">
                  <svg id="eye-trunk" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Campos exclusivos de IP_AUTH -->
        <div id="fields-ip-auth">
          <div class="flex flex-col gap-1.5">
            <label class="text-[13px] font-medium text-[#1a1a1a]">IP / Hostname de identificação <span class="text-[#E24B4A]">*</span></label>
            <input id="input-identify-match" name="identifyMatch" type="text" maxlength="255"
                   th:value="${trunk?.identifyMatch}"
                   placeholder="Ex: sip.operadora.com.br"
                   class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors font-mono"/>
            <span class="text-[11px] text-[#aaa]">Chamadas SIP originadas deste IP/hostname serão identificadas como este tronco.</span>
          </div>
        </div>

        <hr class="border-t border-[#e5e7eb]"/>

        <!-- Configuração -->
        <p class="text-[12px] font-semibold text-[#888] uppercase tracking-wide">Configuração</p>

        <div class="flex flex-col gap-1.5">
          <label class="text-[13px] font-medium text-[#1a1a1a]">Prefixo de discagem</label>
          <input name="prefix" type="text" maxlength="20"
                 th:value="${trunk?.prefix}"
                 placeholder="Ex: 8712 (opcional)"
                 class="w-full px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] transition-colors font-mono"/>
          <span class="text-[11px] text-[#aaa]">Adicionado antes do número discado. Deixe em branco se não usar.</span>
        </div>

      </div>

      <div class="modal-footer">
        <div th:if="${trunk != null}" class="contents">
          <div th:replace="~{fragments/confirm-delete :: confirm-delete(
              deleteUrl=${'/trunks/' + trunk.name},
              hxTarget='#modal-container',
              hxInclude='.trunk-filter',
              label=${'o tronco ' + trunk.name})}">
          </div>
        </div>
        <button type="button" onclick="closeModal()" class="btn-modal-cancel">Cancelar</button>
        <button type="submit" class="btn-modal-save"
                th:text="${trunk != null} ? 'Salvar' : 'Criar Tronco'">Criar Tronco</button>
      </div>
    </form>

  </div>

  <!-- OOB: toast -->
  <th:block th:if="${toastMsg}">
    <div th:replace="~{fragments/toast :: toast(toastMessage=${toastMsg}, toastType=${toastType})}"></div>
  </th:block>

  <!-- Trigger: recarrega tabela após criação -->
  <div th:if="${refreshTable}"
       hx-get="/trunks/table"
       hx-target="#table-container"
       hx-swap="innerHTML"
       hx-trigger="load"
       class="hidden"></div>

  <script>
    (function () {
      // ── toggle show/hide senha ─────────────────────────────────────────────
      var pwd = document.getElementById('pwd-trunk');
      var eye = document.getElementById('eye-trunk');
      var btn = document.getElementById('btn-toggle-pw');
      if (btn && pwd) {
        btn.addEventListener('click', function () {
          if (pwd.type === 'password') {
            pwd.type = 'text';
            eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
          } else {
            pwd.type = 'password';
            eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
          }
        });
      }

      // ── seletor de tipo de autenticação ───────────────────────────────────
      function setAuthType(type) {
        document.getElementById('input-auth-type').value = type;

        var credFields  = document.getElementById('fields-credential');
        var ipFields    = document.getElementById('fields-ip-auth');
        var btnCred     = document.getElementById('btn-auth-credential');
        var btnIp       = document.getElementById('btn-auth-ip');
        var usernameIn  = document.getElementById('input-username');
        var identifyIn  = document.getElementById('input-identify-match');

        var isCredential = type === 'CREDENTIAL';

        credFields.style.display  = isCredential ? '' : 'none';
        ipFields.style.display    = isCredential ? 'none' : '';

        // required dinâmico
        if (usernameIn) usernameIn.required = isCredential;
        if (identifyIn) identifyIn.required = !isCredential;

        // estilos dos botões
        var activeClass   = 'px-3 py-[7px] border-r border-[#e0e0e0] transition-colors bg-white text-[#1a1a1a] font-medium';
        var inactiveClass = 'px-3 py-[7px] border-r border-[#e0e0e0] transition-colors bg-white text-[#888]';
        if (btnCred) btnCred.className = isCredential
          ? 'px-3 py-[7px] border-r border-[#e0e0e0] transition-colors bg-white text-[#1a1a1a] font-medium'
          : 'px-3 py-[7px] border-r border-[#e0e0e0] transition-colors bg-white text-[#888]';
        if (btnIp) btnIp.className = !isCredential
          ? 'px-3 py-[7px] transition-colors bg-white text-[#1a1a1a] font-medium'
          : 'px-3 py-[7px] transition-colors bg-white text-[#888]';
      }

      // inicializar com o tipo atual
      var currentType = document.getElementById('input-auth-type').value || 'CREDENTIAL';
      setAuthType(currentType);

      // expor para os botões onclick
      window.setAuthType = setAuthType;
    })();
  </script>
</div>

</body>
</html>
