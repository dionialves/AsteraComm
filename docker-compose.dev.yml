# Docker Compose para ambiente de DESENVOLVIMENTO
# Uso: docker compose -f docker-compose.dev.yml up -d
#
# Características:
# - Hot reload no frontend (Astro/Vite)
# - Reinício automático no backend com spring-boot-devtools
# - Volumes montando código fonte para edição em tempo real
# - Cache do Maven para builds mais rápidas

services:
  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      - POSTGRES_DB=asteracomm
      - POSTGRES_USER=asteracomm
      - POSTGRES_PASSWORD=asteracomm
      - TZ=America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      asteracomm-network-dev:
        ipv4_address: 172.18.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asteracomm"]
      interval: 5s
      timeout: 5s
      retries: 5

  asterisk:
    network_mode: host
    platform: linux/amd64
    build: ./asterisk
    container_name: asterisk
    volumes:
      - ./asterisk/config:/etc/asterisk
      - ./asterisk/odbc.ini:/etc/odbc.ini
      - ./asterisk/odbcinst.ini:/etc/odbcinst.ini
      - dialplan-generated:/etc/asterisk/generated
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend
    ports:
      - "8090:8090"
      - "35729:35729"
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
      - dialplan-generated:/dialplan-generated
    environment:
      - TZ=America/Sao_Paulo
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/asteracomm
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      asteracomm-network-dev:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "4321:4321"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - TZ=America/Sao_Paulo
    depends_on:
      - backend
    networks:
      asteracomm-network-dev:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Hot reload ativo por padrão com npm run dev

  # NGINX não é necessário em dev - acessa frontend diretamente na porta 4321

volumes:
  pgdata:
  maven-cache:
  frontend-node-modules:
  dialplan-generated:

networks:
  asteracomm-network-dev:
    driver: bridge
