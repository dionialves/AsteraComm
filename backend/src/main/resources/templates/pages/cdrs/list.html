<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}" lang="pt-BR">

<head>
    <title>CDRs</title>
</head>

<body>
    <div layout:fragment="content">

        <!-- ── Cabeçalho ─────────────────────────────────────────────────────────── -->
        <div class="mb-7">
            <h1 class="text-[22px] font-medium text-[#1a1a1a]">Ligações</h1>
            <p class="text-[13px] text-[#888] mt-0.5">Histórico de chamadas processadas (CDR)</p>
        </div>

        <!-- ── Toolbar ───────────────────────────────────────────────────────────── -->
        <div class="mb-7">

            <!-- Linha 1: texto + status -->
            <div class="flex items-end gap-3 mb-4">
                <!-- Origem -->
                <div class="flex flex-col gap-1">
                    <label class="text-[11px] font-medium text-[#888]">Origem</label>
                    <div class="relative">
                        <svg class="absolute left-[10px] top-1/2 -translate-y-1/2 text-[#aaa] pointer-events-none"
                            width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" name="src" placeholder="Buscar..."
                            class="cdr-filter w-[180px] pl-[30px] pr-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors"
                            hx-get="/cdrs/table" hx-trigger="keyup changed delay:300ms" hx-target="#table-container"
                            hx-swap="innerHTML" hx-include=".cdr-filter" />
                    </div>
                </div>
                <!-- Destino -->
                <div class="flex flex-col gap-1">
                    <label class="text-[11px] font-medium text-[#888]">Destino</label>
                    <input type="text" name="dst" placeholder="Buscar..."
                        class="cdr-filter w-[180px] px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors"
                        hx-get="/cdrs/table" hx-trigger="keyup changed delay:300ms" hx-target="#table-container"
                        hx-swap="innerHTML" hx-include=".cdr-filter" />
                </div>
                <!-- Circuito -->
                <div class="flex flex-col gap-1">
                    <label class="text-[11px] font-medium text-[#888]">Circuito</label>
                    <input type="text" name="circuitNumber" placeholder="Buscar..."
                        class="cdr-filter w-[180px] px-3 py-[9px] text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors"
                        hx-get="/cdrs/table" hx-trigger="keyup changed delay:300ms" hx-target="#table-container"
                        hx-swap="innerHTML" hx-include=".cdr-filter" />
                </div>
                <!-- Status -->
                <div class="flex flex-col gap-1">
                    <label class="text-[11px] font-medium text-[#888]">Status</label>
                    <input type="hidden" id="cdr-disposition" name="disposition" class="cdr-filter" value="" />
                    <div class="flex border border-[#e0e0e0] rounded-md overflow-hidden text-[13px]">
                        <button type="button" id="disp-all"
                            class="px-3 py-[9px] bg-white text-[#1a1a1a] font-medium border-r border-[#e0e0e0]"
                            onclick="setDisposition(this, '')">Todos</button>
                        <button type="button" id="disp-answered"
                            class="px-3 py-[9px] text-[#888] border-r border-[#e0e0e0]"
                            onclick="setDisposition(this, 'ANSWERED')">Atendida</button>
                        <button type="button" id="disp-noanswer"
                            class="px-3 py-[9px] text-[#888] border-r border-[#e0e0e0]"
                            onclick="setDisposition(this, 'NO ANSWER')">Sem resposta</button>
                        <button type="button" id="disp-busy" class="px-3 py-[9px] text-[#888] border-r border-[#e0e0e0]"
                            onclick="setDisposition(this, 'BUSY')">Ocupado</button>
                        <button type="button" id="disp-failed" class="px-3 py-[9px] text-[#888]"
                            onclick="setDisposition(this, 'FAILED')">Falha</button>
                    </div>
                </div>
            </div>

            <!-- Linha 2: datas -->
            <div class="flex items-end gap-3 mb-4">
                <div class="flex flex-col gap-1">
                    <label class="text-[11px] font-medium text-[#888]">Data início</label>
                    <input type="date" name="from"
                        class="cdr-filter py-[9px] px-3 text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors" />
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[11px] font-medium text-[#888]">Data fim</label>
                    <input type="date" name="to"
                        class="cdr-filter py-[9px] px-3 text-[13px] border border-[#e0e0e0] rounded-md outline-none focus:border-[#1D9E75] bg-white transition-colors" />
                </div>
            </div>

            <!-- Linha 3: botões + paginação -->
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button type="button" onclick="triggerTableLoad(0)"
                        class="flex items-center gap-1.5 bg-[#1D9E75] text-white text-[13px] font-medium px-3 py-[9px] rounded-md hover:opacity-90 transition-opacity">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        Filtrar
                    </button>
                    <button type="button" onclick="clearCdrFilters()"
                        class="px-3 py-[9px] border border-[#d1d5db] bg-white rounded-md text-[13px] text-[#374151] hover:bg-[#f5f5f5] transition-colors">
                        Limpar
                    </button>
                </div>
                <!-- Paginação (populada via OOB swap pelo table fragment) -->
                <div id="pagination-toolbar" class="flex items-center gap-2"></div>
            </div>

        </div>

        <!-- ── Tabela container ──────────────────────────────────────────────────── -->
        <div id="table-container" hx-get="/cdrs/table" hx-trigger="load" hx-swap="innerHTML">
        </div>

        <!-- ── Contador de registros ─────────────────────────────────────────────── -->
        <p id="cdr-counter" class="text-[12px] text-[#888] text-right mt-3"></p>

        <script>
            // ── Sort state ─────────────────────────────────────────────────────────────
            var currentSortField = 'callDate';
            var currentSortDir = 'desc';

            var SORT_ASC = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
            var SORT_DESC = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

            function updateSortIcons() {
                document.querySelectorAll('.sort-col[data-field]').forEach(function (el) {
                    var existing = el.querySelector('svg');
                    if (existing) existing.remove();
                    if (el.dataset.field === currentSortField) {
                        el.insertAdjacentHTML('beforeend', currentSortDir === 'asc' ? SORT_ASC : SORT_DESC);
                    }
                });
            }

            function setDisposition(btn, value) {
                document.querySelectorAll('[id^="disp-"]').forEach(function (b) {
                    b.classList.remove('bg-white', 'text-[#1a1a1a]', 'font-medium');
                    b.classList.add('text-[#888]');
                });
                btn.classList.add('bg-white', 'text-[#1a1a1a]', 'font-medium');
                btn.classList.remove('text-[#888]');
                document.getElementById('cdr-disposition').value = value;
            }

            function clearCdrFilters() {
                document.querySelectorAll('.cdr-filter[name]').forEach(function (el) {
                    el.value = '';
                });
                // reset disposition button group
                document.querySelectorAll('[id^="disp-"]').forEach(function (b) {
                    b.classList.remove('bg-white', 'text-[#1a1a1a]', 'font-medium');
                    b.classList.add('text-[#888]');
                });
                var allBtn = document.getElementById('disp-all');
                if (allBtn) {allBtn.classList.add('bg-white', 'text-[#1a1a1a]', 'font-medium'); allBtn.classList.remove('text-[#888]');}
                currentSortField = 'callDate';
                currentSortDir = 'desc';
                triggerTableLoad(0);
            }

            function triggerTableLoad(page) {
                var params = new URLSearchParams();
                document.querySelectorAll('.cdr-filter[name]').forEach(function (el) {
                    if (el.value) params.append(el.name, el.value);
                });
                params.set('page', String(page));
                params.set('size', '20');
                params.set('sort', currentSortField + ',' + currentSortDir);
                htmx.ajax('GET', '/cdrs/table?' + params.toString(), {target: '#table-container', swap: 'innerHTML'});
            }

            document.addEventListener('htmx:afterSwap', function (e) {
                if (e.detail.target.id === 'table-container') {
                    var si = document.getElementById('current-sort');
                    if (si) {
                        var parts = si.value.split(',');
                        currentSortField = parts[0] || 'callDate';
                        currentSortDir = parts[1] || 'desc';
                    }
                    updateSortIcons();

                    document.querySelectorAll('.sort-col[data-field]').forEach(function (el) {
                        el.addEventListener('click', function () {
                            if (currentSortField === el.dataset.field) {
                                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
                            } else {
                                currentSortField = el.dataset.field;
                                currentSortDir = 'asc';
                            }
                            var si2 = document.getElementById('current-sort');
                            if (si2) si2.value = currentSortField + ',' + currentSortDir;
                            updateSortIcons();
                            triggerTableLoad(0);
                        });
                    });

                    document.querySelectorAll('.cdr-row[data-id]').forEach(function (row) {
                        row.addEventListener('click', function () {
                            document.querySelectorAll('.cdr-row.row-selected').forEach(function (r) {r.classList.remove('row-selected');});
                            row.classList.add('row-selected');
                        });
                    });
                }
                if (e.detail.target.id === 'modal-container' && !e.detail.target.innerHTML.trim()) {
                    document.querySelectorAll('.cdr-row.row-selected').forEach(function (r) {r.classList.remove('row-selected');});
                }
            });
        </script>

    </div>
</body>

</html>
